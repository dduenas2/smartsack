# =============================================================================
# alembic.ini — Configuración de Alembic para SmartSack
# -----------------------------------------------------------------------------
# La URL real de la base de datos NO se pone aquí: se inyecta en runtime
# desde la variable de entorno DATABASE_URL en alembic/env.py.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# La URL se establece dinámicamente en env.py; este valor es solo un placeholder.
sqlalchemy.url = driver://user:pass@host/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
