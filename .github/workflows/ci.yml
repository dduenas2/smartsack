# =============================================================================
# ci.yml — Pipeline de Integración Continua de SmartSack
# -----------------------------------------------------------------------------
# Valida cada push a main y cada pull request:
#   · frontend-quality : ESLint (flat config) + Vitest (componentes React).
#   · integration      : levanta el stack completo con Docker Compose, migra y
#                        siembra la BD, corre los tests del backend (Pytest) y
#                        los 4 flujos E2E (Playwright) contra Nginx.
#
# El chatbot corre en modo fallback (ANTHROPIC_API_KEY vacío), que es lo que
# las pruebas E2E verifican; no se requiere ningún secret para que el CI pase.
# El modelo de ML no se entrena: los tests de predicción que dependen del
# .joblib se saltan solos vía pytest.skipif.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancela ejecuciones antiguas de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1) Calidad del frontend: lint + pruebas unitarias (rápido, sin servicios).
  # ---------------------------------------------------------------------------
  frontend-quality:
    name: Frontend · lint + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: ESLint (flat config)
        working-directory: frontend
        run: npm run lint

      - name: Vitest (componentes)
        working-directory: frontend
        run: npm run test

  # ---------------------------------------------------------------------------
  # 2) Integración: stack completo + backend (Pytest) + E2E (Playwright).
  # ---------------------------------------------------------------------------
  integration:
    name: Integración · backend + E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/e2e/package-lock.json

      - name: Preparar variables de entorno (.env de CI)
        run: |
          cp .env.example .env
          sed -i \
            -e 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=ci_password|' \
            -e 's|^DATABASE_URL=.*|DATABASE_URL=postgresql+psycopg2://smartsack:ci_password@postgres:5432/smartsack|' \
            -e 's|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=ci_secret_0123456789abcdef0123456789abcdef|' \
            .env
          # ANTHROPIC_API_KEY se deja vacío a propósito → chatbot en modo fallback.

      - name: Levantar el stack
        run: docker compose up -d --build

      - name: Esperar a que el stack esté listo
        run: |
          echo "Esperando backend (/api/health) y SPA (/)..."
          for i in $(seq 1 60); do
            api_ok=$(curl -fsS http://localhost/api/health >/dev/null 2>&1 && echo yes || echo no)
            spa_ok=$(curl -fsS http://localhost/ >/dev/null 2>&1 && echo yes || echo no)
            if [ "$api_ok" = "yes" ] && [ "$spa_ok" = "yes" ]; then
              echo "Stack listo tras ${i} intento(s)."
              exit 0
            fi
            sleep 3
          done
          echo "::error::El stack no respondió a tiempo."
          docker compose ps
          exit 1

      - name: Migrar la base de datos
        run: docker compose exec -T backend alembic upgrade head

      - name: Sembrar datos de demostración
        run: docker compose exec -T backend python -m scripts.seed

      - name: Tests del backend (Pytest)
        run: docker compose exec -T backend pytest -q

      - name: Instalar dependencias E2E
        working-directory: frontend/e2e
        run: npm ci

      - name: Instalar navegadores de Playwright (+ libs de sistema)
        working-directory: frontend/e2e
        run: npx playwright install --with-deps chromium

      - name: Tests E2E (Playwright)
        working-directory: frontend/e2e
        env:
          E2E_BASE_URL: http://localhost
        run: npm test

      - name: Reporte E2E (si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Logs del stack (si falla)
        if: failure()
        run: docker compose logs --no-color --tail 200
