# =============================================================================
# nginx.conf — Reverse proxy de SmartSack
# -----------------------------------------------------------------------------
# Unifica frontend (Vite dev server) y backend (FastAPI) tras el puerto 80.
#
#   /        →  frontend  (http://frontend:5173)
#   /api/    →  backend   (http://backend:8000)   [se elimina el prefijo /api]
#   /ws/     →  backend   (http://backend:8000)   [WebSockets, sin prefijo]
#   /docs    →  backend   (http://backend:8000)   [Swagger UI directo]
#   /openapi.json → backend
#
# El servicio "frontend" y "backend" son resoluciones DNS dentro de la red
# Docker (smartsack_net definida en docker-compose.yml).
# =============================================================================

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:5173;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de body para uploads (CSV del ETL, etc.)
    client_max_body_size 50m;

    # ---- Logs ----
    access_log /var/log/nginx/smartsack_access.log;
    error_log  /var/log/nginx/smartsack_error.log warn;

    # -------------------------------------------------------------------------
    # /api/ → Backend FastAPI (preserva el prefijo /api: el backend lo monta).
    # NOTA: SIN barra al final del proxy_pass para no recortar el prefijo.
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # /ws/ → WebSockets (backend), requiere Upgrade/Connection
    # -------------------------------------------------------------------------
    location /ws/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # -------------------------------------------------------------------------
    # Documentación de la API (Swagger / ReDoc) accesible directamente
    # -------------------------------------------------------------------------
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # / → Frontend (Vite dev server con HMR vía WebSocket en /@vite/)
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
